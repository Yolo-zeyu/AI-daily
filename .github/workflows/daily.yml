name: AI Daily Update

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:       # 支持手动触发（调试用）

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 允许 push 更新 data/ 和 index.html

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily update script
        run: python scripts/main.py
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Commit and Push updated data
        run: |
          git config user.name "AI Daily Bot"
          git config user.email "bot@ai-daily.local"
          git add data/ logs/
          git commit -m "📰 daily update $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push
