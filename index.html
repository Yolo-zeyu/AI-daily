<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 日报</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            'primary-dark': '#3730A3',
            surface: '#FAFAFA',
            'text-primary': '#1A1A2E',
            'text-secondary': '#374151',
            'text-muted': '#9CA3AF',
          },
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', '"PingFang SC"', 'sans-serif'],
            mono: ['JetBrains Mono', 'SF Mono', 'monospace'],
          },
          borderRadius: {
            'card': '12px',
            'pill': '9999px',
          },
          boxShadow: {
            'card': '0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04)',
            'card-hover': '0 4px 12px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.06)',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-surface text-text-secondary font-sans">

  <!-- 导航栏：毛玻璃 sticky -->
  <nav class="sticky top-0 z-50 bg-white/85 backdrop-blur-md border-b border-black/6 h-16 flex items-center">
    <div class="max-w-[1200px] mx-auto px-6 w-full flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🤖</span>
        <span class="text-xl font-extrabold text-text-primary">AI 日报</span>
        <span class="text-xs text-text-muted ml-1 hidden sm:inline">每日 AI 资讯精选</span>
      </div>
      <div class="flex items-center gap-3">
        <select id="date-selector" class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 text-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 bg-white cursor-pointer font-mono">
        </select>
        <select id="sort-selector" class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 text-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 bg-white cursor-pointer">
          <option value="importance">按重要性</option>
          <option value="time">按时间</option>
        </select>
      </div>
    </div>
  </nav>

  <!-- 分类标签栏 -->
  <div class="sticky top-16 z-40 bg-white/90 backdrop-blur-sm border-b border-gray-100">
    <div class="max-w-[1200px] mx-auto px-6">
      <div id="category-tabs" class="flex gap-2 py-3 overflow-x-auto scrollbar-hide">
        <!-- JS 动态填充 -->
      </div>
    </div>
  </div>

  <main class="max-w-[1200px] mx-auto px-6 py-10 space-y-12">

    <!-- 日期标题 -->
    <header class="fade-in">
      <h1 id="report-date" class="text-3xl font-extrabold text-text-primary">2026年5月20日 AI 日报</h1>
      <p id="report-time" class="text-sm text-text-muted mt-1">更新于 08:00</p>
    </header>

    <!-- 模块一：今日要闻 — 混合布局 -->
    <section id="news-section">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-text-primary flex items-center gap-2">
          📰 今日要闻
          <span id="news-count" class="text-xs font-normal text-text-muted bg-gray-100 px-2.5 py-0.5 rounded-pill">0 条</span>
        </h2>
      </div>

      <!-- 头条大图 -->
      <div id="headline-card" class="mb-6">
        <!-- JS 渲染 -->
      </div>

      <!-- 图文卡片 + 纯文字卡片 双列 -->
      <div id="news-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- JS 渲染 -->
      </div>
    </section>

    <div class="border-t border-gray-200"></div>

    <!-- 模块二：投融资速递 -->
    <section id="deals-section">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-text-primary flex items-center gap-2">
          💰 投融资速递
          <span id="deals-count" class="text-xs font-normal text-text-muted bg-gray-100 px-2.5 py-0.5 rounded-pill">0 条</span>
        </h2>
      </div>
      <div id="deals-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- JS 渲染 -->
      </div>
    </section>

    <div class="border-t border-gray-200"></div>

    <!-- 模块三：今日学习 — 4个子板块 -->
    <section id="learning-section">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-text-primary flex items-center gap-2">
          📚 今日学习
        </h2>
        <span id="learning-time" class="text-sm text-text-muted bg-gray-100 px-3 py-1 rounded-pill">预计学习：35 分钟</span>
      </div>

      <!-- 📌 核心概念 -->
      <div class="mb-8">
        <h3 class="text-base font-semibold text-text-primary mb-4 flex items-center gap-2">
          📌 核心概念
          <span class="text-xs text-text-muted font-normal">（约 10 分钟）</span>
        </h3>
        <div id="concepts-list" class="space-y-3">
          <!-- JS 渲染 -->
        </div>
      </div>

      <!-- 📰 深度阅读 -->
      <div class="mb-8">
        <h3 class="text-base font-semibold text-text-primary mb-4 flex items-center gap-2">
          📰 深度阅读
          <span class="text-xs text-text-muted font-normal">（约 15 分钟）</span>
        </h3>
        <div id="deep-reads-list" class="space-y-3">
          <!-- JS 渲染 -->
        </div>
      </div>

      <!-- 🎬 视频学习 -->
      <div class="mb-8">
        <h3 class="text-base font-semibold text-text-primary mb-4 flex items-center gap-2">
          🎬 视频学习
          <span class="text-xs text-text-muted font-normal">（约 10 分钟）</span>
        </h3>
        <div id="videos-list" class="space-y-3">
          <!-- JS 渲染 -->
        </div>
      </div>

      <!-- 💡 每日一问 -->
      <div>
        <h3 class="text-base font-semibold text-text-primary mb-4 flex items-center gap-2">
          💡 每日一问
          <span class="text-xs text-text-muted font-normal">（约 5 分钟）</span>
        </h3>
        <div id="daily-question">
          <!-- JS 渲染 -->
        </div>
      </div>
    </section>

  </main>

  <!-- 底部 -->
  <footer class="border-t border-gray-200 bg-white mt-16">
    <div class="max-w-[1200px] mx-auto px-6 py-8 text-center">
      <p class="text-sm text-text-muted">内容版权归原作者所有，本站仅做聚合展示</p>
      <p class="text-xs text-gray-300 mt-1">数据来源：36Kr · 机器之心 · 量子位 · The Verge · TechCrunch · Hacker News · Wired · MIT Tech Review</p>
      <p class="text-xs text-gray-300 mt-1">每日 08:00 自动更新 · 由 AI 驱动</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
